<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Timbratura FAS3</title>

<style>
body{
font-family:Arial;
max-width:420px;
margin:30px auto;
padding:0 16px;
}

h1{
font-size:22px;
margin-bottom:20px;
}

input{
width:100%;
font-size:20px;
padding:12px;
margin-bottom:14px;
box-sizing:border-box;
}

button{
width:100%;
font-size:20px;
padding:12px;
}

.msg{
margin-top:15px;
font-size:14px;
}

.ok{color:green;}
.err{color:red;}

</style>
</head>

<body>

<h1 id="titolo">TIMBRATURA</h1>

<form id="form">

<input id="pin" maxlength="6" placeholder="Inserisci PIN" required>

<button type="submit">TIMBRA</button>

</form>

<div id="msg" class="msg"></div>

<script>

const BACKEND_URL="https://script.google.com/macros/s/AKfycbwgCUVXrrTTcAP1HK5PJI7aoA836DPOoyGTrr8EdJvJuUq7A4PcDC7QM4q0Oaxq5x2Mqg/exec";

const url=new URL(window.location.href);
const site=url.searchParams.get("site");
const op=(url.searchParams.get("op")||"").toUpperCase();

const titolo=document.getElementById("titolo");

if(op==="IN"){titolo.innerText="ENTRATA";}
if(op==="OUT"){titolo.innerText="USCITA";}

document.getElementById("form").addEventListener("submit",async function(e){

e.preventDefault();

const pin=document.getElementById("pin").value.toUpperCase();

const data=new URLSearchParams();
data.append("site",site);
data.append("op",op);
data.append("pin",pin);

const res=await fetch(BACKEND_URL,{method:"POST",body:data});
const json=await res.json();

const msg=document.getElementById("msg");

if(json.ok){

  if(op==="OUT"){
    document.body.innerHTML = `
      <div style="font-family:Arial,sans-serif;padding:30px">
        <h1 style="margin:0 0 12px">404 Not Found</h1>
        <p>The requested URL was not found on this server.</p>
      </div>
    `;
    return;
  }

  msg.innerText=json.message;
  msg.className="msg ok";
}
else{
  msg.innerText=json.message;
  msg.className="msg err";
}


});

</script>

</body>
</html>
